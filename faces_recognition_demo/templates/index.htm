<!DOCTYPE html>
<html>
<head>
    <title>احراز هویت بیمه</title>
</head>
<body style="text-align:center; font-family:sans-serif">

<h2>سیستم احراز هویت بیمه</h2>

<h3>روش 1: وب‌کم</h3>
<video id="video" width="400" autoplay></video>
<br>
<button onclick="capture()">بررسی با وب‌کم</button>

<hr>

<h3>روش 2: انتخاب عکس</h3>
<input type="file" id="fileInput">
<button onclick="uploadImage()">بررسی عکس</button>

<h2 id="result"></h2>

<script>
let video = document.getElementById("video");

// فعال کردن وبکم (اگر وجود داشت)
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
    video.srcObject = stream;
})
.catch(err => {
    console.log("No webcam available");
});

function showResult(data){
    let result = document.getElementById("result");

    if(data.status === "success"){
        result.innerHTML = "✔ تایید شد: " + data.name +
                           " (" + data.similarity + "%)";
        result.style.color = "green";
    }else{
        result.innerHTML = "✖ عدم تطابق - اجازه ورود ندارد";
        result.style.color = "red";
    }
}

//وبکم 
function capture(){
    let canvas = document.createElement("canvas");
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    let ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0);

    canvas.toBlob(blob => {
        let formData = new FormData();
        formData.append("image", blob, "capture.jpg");

        fetch("/verify", {
            method: "POST",
            body: formData
        })
        .then(res => res.json())
        .then(showResult);
    });
}

//آپلود فایل 
function uploadImage(){
    let fileInput = document.getElementById("fileInput");
    let file = fileInput.files[0];

    if(!file){
        alert("لطفاً یک عکس انتخاب کنید");
        return;
    }

    let formData = new FormData();
    formData.append("image", file);

    fetch("/verify", {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(showResult);
}
</script>

</body>
</html>
